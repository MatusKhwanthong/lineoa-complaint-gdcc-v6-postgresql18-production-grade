services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-complaint_db}
      POSTGRES_USER: ${POSTGRES_USER:-complaint_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?กรุณากำหนด POSTGRES_PASSWORD ในไฟล์ .env}
      TZ: Asia/Bangkok
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - postgres18_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-complaint_app} -d ${POSTGRES_DB:-complaint_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - internal

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-complaint_app}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-complaint_db}
      UPLOAD_DIR: /app/uploads
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - complaint_uploads:/app/uploads
    networks:
      - internal

volumes:
  postgres18_data:
  complaint_uploads:

networks:
  internal:
    driver: bridge
