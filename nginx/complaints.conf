limit_req_zone $binary_remote_addr zone=complaint_api:10m rate=20r/s;

server {
    listen 80;
    server_name complaint.example.go.th;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name complaint.example.go.th;

    ssl_certificate     /etc/letsencrypt/live/complaint.example.go.th/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/complaint.example.go.th/privkey.pem;

    client_max_body_size 45m;

    location / {
        limit_req zone=complaint_api burst=40 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
    }
}
