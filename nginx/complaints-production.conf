limit_req_zone $binary_remote_addr zone=complaint_api:20m rate=15r/s;
limit_conn_zone $binary_remote_addr zone=per_ip:10m;

server {
  listen 80;
  server_name complaint.example.go.th;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  server_name complaint.example.go.th;
  server_tokens off;
  ssl_certificate /etc/ssl/complaint/fullchain.pem;
  ssl_certificate_key /etc/ssl/complaint/privkey.pem;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_session_cache shared:SSL:20m;
  ssl_session_timeout 1d;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
  add_header X-Content-Type-Options nosniff always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  client_max_body_size 45m;

  location = /health/live { proxy_pass http://127.0.0.1:3000; access_log off; }
  location = /health/ready { proxy_pass http://127.0.0.1:3000; access_log off; }

  location / {
    limit_req zone=complaint_api burst=30 nodelay;
    limit_conn per_ip 30;
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }
}
